services:
  nextcloud:
    image: nextcloud:latest
    restart: always
    ports:
      - "8080:80"
    volumes:
      - nextcloud_data:/var/www/html
      - /mnt:/mnt # only keep if this is where your drives are :)
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=192.168.1.100:8080

volumes:
  nextcloud_data:
